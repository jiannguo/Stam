        tempCtx.fillStyle = '#ffffff';
        tempCtx.fillRect(0, 0, 400, 400);
        
        tempCtx.fillStyle = '#000000';
        tempCtx.beginPath();
        tempCtx.arc(200, 160, 80, 0, Math.PI * 2);
        tempCtx.fill();
        
        tempCtx.beginPath();
        tempCtx.ellipse(200, 310, 110, 70, 0, 0, Math.PI * 2);
        tempCtx.fill();
        
        tempCtx.fillStyle = '#ffffff';
        tempCtx.beginPath();
        tempCtx.arc(170, 150, 12, 0, Math.PI * 2);
        tempCtx.arc(230, 150, 12, 0, Math.PI * 2);
        tempCtx.fill();
        tempCtx.fillStyle = '#000000';
        tempCtx.beginPath();
        tempCtx.arc(170, 150, 6, 0, Math.PI * 2);
        tempCtx.arc(230, 150, 6, 0, Math.PI * 2);
        tempCtx.fill();
        
        tempCtx.strokeStyle = '#ffffff';
        tempCtx.lineWidth = 6;
        tempCtx.beginPath();
        tempCtx.arc(200, 180, 25, 0, Math.PI);
        tempCtx.stroke();
        
        const img = new Image();
        img.onload = () => {
          setImage(img); // 設定為初始示範圖
        };
        img.src = tempCanvas.toDataURL();
      }, []);

      // 預載 16 款 SVG 圖案快取
      useEffect(() => {
        const loadedMap = {};
        let loadedCount = 0;
        const keys = Object.keys(CLIPART_LIBRARY);
        
        keys.forEach(key => {
          const img = new Image();
          img.onload = () => {
            loadedMap[key] = img;
            loadedCount++;
            if (loadedCount === keys.length) {
              setClipartImages(loadedMap);
            }
          };
          img.src = getClipartImgSrc(key);
        });
      }, []);

      // 處理上傳檔案
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        setImageName(file.name);
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            setImage(img);
            setImgScale(1.0);
            setImgX(0);
            setImgY(-20);
            setImgRotation(0);
            setActiveTab("upload");
            showToast("手繪照片已完美載入！您可以用滑鼠在圓圈內拖曳、調整縮放。");
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      // 獲取 SVG 的 Data URL 格式
      const getClipartImgSrc = (key) => {
        const svgContent = CLIPART_LIBRARY[key]?.svg;
        if (!svgContent) return "";
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgContent)}`;
      };

      // 渲染印章二值化與文字配置 (虛擬 1000px 直徑解析度)
      const drawStampBase = (canvas, size = 1000) => {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = size;
        canvas.height = size;
        
        ctx.save();
        ctx.scale(size / 1000, size / 1000);
        
        // 1. 底色純白 (曝光底色規格)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1000, 1000);

        // 2. 建立照片暫存層
        const photoCanvas = document.createElement('canvas');
        photoCanvas.width = 1000;
        photoCanvas.height = 1000;
        const pCtx = photoCanvas.getContext('2d');
        
        pCtx.save();
        pCtx.beginPath();
        pCtx.arc(500, 500, 475, 0, Math.PI * 2);
        pCtx.clip();

        if (activeTab === 'upload' && image) {
          pCtx.save();
          pCtx.translate(500 + imgX, 500 + imgY);
          pCtx.rotate((imgRotation * Math.PI) / 180);
          
          const iw = image.width;
          const ih = image.height;
          const minDim = Math.min(iw, ih);
          const scaleBase = (750 / minDim) * imgScale;
          pCtx.drawImage(image, -iw * scaleBase / 2, -ih * scaleBase / 2, iw * scaleBase, iw * scaleBase);
          pCtx.restore();
          
          // 自動去背與極高對比處理演算法
          const imgData = pCtx.getImageData(0, 0, 1000, 1000);
          const data = imgData.data;
          const keyRgb = hexToRgb(bgColorKey);

          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            const a = data[i+3];

            const xCoord = (i / 4) % 1000;
            const yCoord = Math.floor((i / 4) / 1000);
            const distFromCenter = Math.sqrt(Math.pow(xCoord - 500, 2) + Math.pow(yCoord - 500, 2));

            // A. 正圓裁切：將四周雜訊黑影一鍵切除
            if (distFromCenter > focalCropRadius) {
              data[i] = 255; data[i+1] = 255; data[i+2] = 255; data[i+3] = 255;
              continue;
            }

            if (a < 10) {
              data[i] = 255; data[i+1] = 255; data[i+2] = 255; data[i+3] = 255;
              continue;
            }

            // B. 背景去色橡皮擦
            const colorDist = Math.sqrt(
              Math.pow(r - keyRgb.r, 2) + 
              Math.pow(g - keyRgb.g, 2) + 
              Math.pow(b - keyRgb.b, 2)
            );

            if (colorDist < bgTolerance) {
              data[i] = 255; data[i+1] = 255; data[i+2] = 255; data[i+3] = 255;
              continue;
            }

            // C. 雙臨界曝光去背 Levels 演算法
            const gray = 0.299 * r + 0.587 * g + 0.114 * b;
            let finalVal = 255;
            if (gray <= blackPoint) {
              finalVal = 0;
            } else if (gray >= whitePoint) {
              finalVal = 255;
            } else {
              const ratio = (gray - blackPoint) / (whitePoint - blackPoint);
              finalVal = ratio < 0.5 ? 0 : 255;
            }

            data[i] = finalVal;
            data[i+1] = finalVal;
            data[i+2] = finalVal;
            data[i+3] = 255;
          }
          pCtx.putImageData(imgData, 0, 0);

          if (enableLineBoost) {
            pCtx.shadowColor = 'black';
            pCtx.shadowBlur = 1;
          }
        } else {
          // 繪製內建卡通 SVG 向量
          pCtx.fillStyle = '#ffffff';
          pCtx.fillRect(0, 0, 1000, 1000);
          
          const cachedImg = clipartImages[selectedClipart];
          if (cachedImg) {
            pCtx.save();
            const targetY = stampLayout === 'bottom-bar' ? 470 + imgY : 500 + imgY;
            pCtx.translate(500 + imgX, targetY);
            pCtx.rotate((imgRotation * Math.PI) / 180);
            
            const svgSize = 440 * imgScale;
            pCtx.drawImage(cachedImg, -svgSize/2, -svgSize/2, svgSize, svgSize);
            pCtx.restore();
          }
        }
        pCtx.restore();

        // 疊加處理完的影像
        ctx.drawImage(photoCanvas, 0, 0);

        // 3. 水平分割座 (下分欄圓章排版)
        if (stampLayout === 'bottom-bar') {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(50, dividerY, 900, 1000 - dividerY - 50);

          ctx.strokeStyle = '#000000';
          ctx.lineWidth = dividerWidth;
          ctx.lineCap = 'square';
          ctx.beginPath();
          const distFromCenter = Math.abs(500 - dividerY);
          const chordHalf = Math.sqrt(450 * 450 - distFromCenter * distFromCenter);
          ctx.moveTo(500 - chordHalf + borderWidth/2, dividerY);
          ctx.lineTo(500 + chordHalf - borderWidth/2, dividerY);
          ctx.stroke();
        }

        // 4. 外圓框樣式
        ctx.strokeStyle = '#000000';
        ctx.lineCap = 'round';
        
        if (borderType === 'single') {
          ctx.lineWidth = borderWidth;
          ctx.beginPath();
          ctx.arc(500, 500, 460 - borderWidth/2, 0, Math.PI * 2);
          ctx.stroke();
        } else if (borderType === 'double') {
          ctx.lineWidth = borderWidth;
          ctx.beginPath();
          ctx.arc(500, 500, 465 - borderWidth/2, 0, Math.PI * 2);
          ctx.stroke();
          
          ctx.lineWidth = Math.max(4, borderWidth / 3);
          ctx.beginPath();
          ctx.arc(500, 500, 465 - borderWidth - 15, 0, Math.PI * 2);
          ctx.stroke();
        } else if (borderType === 'bold-single') {
          ctx.lineWidth = borderWidth * 1.6;
          ctx.beginPath();
          ctx.arc(500, 500, 460 - (borderWidth * 1.6)/2, 0, Math.PI * 2);
          ctx.stroke();
        }

        // 5. 中英文文字大字渲染與半徑位移修正
        ctx.fillStyle = '#000000';
        
        const renderArchedText = (text, startAngle, endAngle, radius, size, isReversed, spaceFactor) => {
          if (!text) return;
          ctx.save();
          
          // 修正字型定義語法，防止 iOS 瀏覽器報錯不渲染
          const fontName = fontFamily === 'Serif'
            ? '"Noto Serif TC", "DFKai-SB", "Microsoft JhengHei", serif'
            : '"Microsoft JhengHei", "Arial Black", sans-serif';
          
          ctx.font = `bold ${size}px ${fontName}`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          const chars = text.split("");
          const len = chars.length;
          
          if (len === 1) {
            const angle = (startAngle + endAngle) / 2;
            ctx.translate(500, 500);
            ctx.rotate(angle);
            ctx.translate(0, isReversed ? radius : -radius);
            if (isReversed) ctx.rotate(Math.PI);
            ctx.fillText(chars[0], 0, 0);
          } else {
            const arcLen = endAngle - startAngle;
            const step = arcLen / (len - 1);
            
            for (let i = 0; i < len; i++) {
              const angle = startAngle + i * step;
              ctx.save();
              ctx.translate(500, 500);
              ctx.rotate(angle);
              ctx.translate(0, isReversed ? radius : -radius);
              if (isReversed) ctx.rotate(Math.PI);
              ctx.fillText(chars[i], 0, 0);
              ctx.restore();
            }
          }
          ctx.restore();
        };

        // 計算環繞半徑 (支援手動調節 textRadiusOffset 緊湊度)
        const baseRadius = 450 - borderWidth - (borderType === 'double' ? 45 : 20) - 15 - textRadiusOffset;

        if (stampLayout === 'bottom-bar') {
          // 下分欄排版頂弧文字
          const topSpan = Math.min(Math.PI * 0.85, textSub.length * textSpacingSub);
          renderArchedText(
            textSub,
            -Math.PI/2 - topSpan/2,
            -Math.PI/2 + topSpan/2,
            baseRadius,
            fontSizeSub,
            false,
            textSpacingSub
          );

          // 橫書主姓名
          ctx.save();
          const mainFont = fontFamily === 'Serif'
            ? '"Noto Serif TC", "DFKai-SB", "Microsoft JhengHei", serif'
            : '"Microsoft JhengHei", sans-serif';
          ctx.font = `bold ${fontSizeMain}px ${mainFont}`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const textAreaY = dividerY + (1000 - dividerY - borderWidth - 40) / 2 + textYOffset;
          ctx.fillText(textMain, 500, textAreaY);
          ctx.restore();

        } else if (stampLayout === 'curved') {
          // 雙弧同心圓章
          const topSpan = Math.min(Math.PI * 0.9, textSub.length * textSpacingSub);
          const bottomSpan = Math.min(Math.PI * 0.9, textBottomArched.length * textSpacingSub * 0.85);

          renderArchedText(
            textSub,
            -Math.PI/2 - topSpan/2,
            -Math.PI/2 + topSpan/2,
            baseRadius,
            fontSizeSub,
            false,
            textSpacingSub
          );

          renderArchedText(
            textBottomArched,
            Math.PI/2 + bottomSpan/2,
            Math.PI/2 - bottomSpan/2,
            baseRadius,
            fontSizeSub * 0.85,
            true,
            textSpacingSub * 0.85
          );

          ctx.save();
          const centerFont = fontFamily === 'Serif'
            ? '"Noto Serif TC", "DFKai-SB", serif'
            : '"Microsoft JhengHei", sans-serif';
          ctx.font = `bold ${fontSizeMain}px ${centerFont}`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(textMain, 500, 500 + textYOffset);
          ctx.restore();
        } else {
          // 極簡
          const bottomSpan = Math.min(Math.PI * 0.75, textMain.length * 0.12);
          renderArchedText(
            textMain,
            Math.PI/2 + bottomSpan/2,
            Math.PI/2 - bottomSpan/2,
            410,
            fontSizeSub,
            true,
            0.12
          );
        }

        ctx.restore();
      };

      // 監聽重繪
      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          drawStampBase(canvas, 600); // 手機即時預覽 600x600 px，流暢無延遲
        }
      }, [
        image, selectedClipart, activeTab, stampLayout, imgScale, imgRotation, imgX, imgY,
        blackPoint, whitePoint, enableLineBoost, borderType, borderWidth, dividerY,
        dividerWidth, textMain, textSub, textBottomArched, fontSizeMain, fontSizeSub,
        textSpacingSub, textRadiusOffset, textYOffset, fontFamily, clipartImages,
        bgColorKey, bgTolerance, focalCropRadius
      ]);

      // 拖曳控制
      const handleDragStart = (e) => {
        setIsDragging(true);
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = 1000 / rect.width;
        const scaleY = 1000 / rect.height;
        
        setDragStart({
          x: (clientX - rect.left) * scaleX - imgX,
          y: (clientY - rect.top) * scaleY - imgY
        });
      };

      const handleDragMove = (e) => {
        if (!isDragging || !dragStart) return;
        if (e.touches) e.preventDefault();
        
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = 1000 / rect.width;
        const scaleY = 1000 / rect.height;

        setImgX((clientX - rect.left) * scaleX - dragStart.x);
        setImgY((clientY - rect.top) * scaleY - dragStart.y);
      };

      const handleDragEnd = () => {
        setIsDragging(false);
        setDragStart(null);
      };

      const handleWheelZoom = (e) => {
        e.preventDefault();
        const step = 0.05;
        if (e.deltaY < 0) {
          setImgScale(prev => Math.min(2.8, prev + step));
        } else {
          setImgScale(prev => Math.max(0.2, prev - step));
        }
      };

      // 重設曝光
      const handleReset = () => {
        setImgScale(1.0);
        setImgRotation(0);
        setImgX(0);
        setImgY(stampLayout === 'bottom-bar' ? -30 : 0);
        setBlackPoint(115);
        setWhitePoint(185);
        setBgTolerance(65);
        setFocalCropRadius(440);
        showToast("已重置所有圖像位置、曝光去背參數。");
      };

      const handleDownload = (diameterCm) => {
        let finalSize = 1200;
        let desc = "1200px 超高清數位版";

        if (diameterCm === 2) {
          finalSize = 236;
          desc = "2.0公分實體規格";
        } else if (diameterCm === 4) {
          finalSize = 472;
          desc = "4.0公分實體規格";
        }

        const downloadCanvas = document.createElement('canvas');
        drawStampBase(downloadCanvas, finalSize);

        const a = document.createElement('a');
        a.download = `光敏印章_${textMain || 'stamp'}_${diameterCm}cm.png`;
        a.href = downloadCanvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        showToast(`【${desc}】PNG 圖檔下載成功！`);
      };

      return (
        <div className="flex-1 flex flex-col">
          
          {/* 頂部通知 */}
          {toastMsg && (
            <div className="fixed top-6 right-6 z-50 bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-6 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 border border-emerald-400 animate-bounce">
              <Icon name="shield" className="w-5 h-5 text-emerald-100" />
              <span className="font-semibold text-sm">{toastMsg}</span>
            </div>
          )}

          {/* 頂部導覽列 */}
          <header className="bg-slate-950 border-b border-slate-800 sticky top-0 z-40 backdrop-blur-md bg-opacity-95">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-tr from-rose-600 to-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-rose-500/25">
                  <Icon name="sparkles" className="w-5.5 h-5.5 text-white" />
                </div>
                <div>
                  <h1 className="text-lg font-bold tracking-tight bg-gradient-to-r from-white via-slate-100 to-rose-400 bg-clip-text text-transparent">
                    光敏卡通印章大師 Pro • 研習特製版
                  </h1>
                  <p className="text-[10px] text-slate-400 hidden sm:block">
                    照片智能去背純化 • 實體2/4公分精密輸出對位 • 免費部署於 GitHub Pages
                  </p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <span className="px-3 py-1 bg-rose-500/10 text-rose-400 rounded-full text-xs font-semibold border border-rose-500/20">
                  白底黑圖 • 雙框預設
                </span>
              </div>
            </div>
          </header>

          {/* 主工作區 */}
          <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            {/* 左側：控制面板 */}
            <div className="lg:col-span-7 xl:col-span-8 flex flex-col gap-6">
              
              {/* 1. 印章排版版型 */}
              <div className="bg-slate-950 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <div className="flex items-center gap-2.5 mb-4">
                  <div className="p-1.5 bg-rose-500/10 text-rose-500 rounded-lg">
                    <Icon name="grid" className="w-5 h-5" />
                  </div>
                  <h2 className="text-md font-bold text-slate-100">1. 選擇印章版面格局</h2>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  {[
                    { id: 'curved', name: '同心圓雙圈印章', desc: '頂弧 + 底弧環繞 (圓形雙框預設)', badge: '最熱門' },
                    { id: 'bottom-bar', name: '經典下分欄圓章', desc: '名字置於水平橫欄底座', badge: '個性化' },
                    { id: 'minimal', name: '極簡無框設計', desc: '純插畫圖樣 + 底圈小字', badge: '紀念章' },
                  ].map(layout => (
                    <button
                      key={layout.id}
                      onClick={() => {
                        setStampLayout(layout.id);
                        if (layout.id === 'curved') {
                          setImgY(0);
                        } else if (layout.id === 'bottom-bar') {
                          setImgY(-30);
                        }
                      }}
                      className={`p-4 rounded-xl border text-left transition-all relative flex flex-col justify-between ${
                        stampLayout === layout.id 
                          ? 'border-rose-500 bg-rose-500/5 text-white shadow-md' 
                          : 'border-slate-800 bg-slate-900/40 text-slate-400 hover:bg-slate-900'
                      }`}
                    >
                      {layout.badge && (
                        <span className="absolute top-2.5 right-2.5 px-1.5 py-0.5 bg-rose-500/15 text-[9px] text-rose-400 rounded-md font-bold">
                          {layout.badge}
                        </span>
                      )}
                      <span className="font-bold text-sm text-slate-200">{layout.name}</span>
                      <span className="text-[10px] text-slate-500 mt-1">{layout.desc}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* 2. 素材與照片載入 */}
              <div className="bg-slate-950 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2.5">
                    <div className="p-1.5 bg-rose-500/10 text-rose-500 rounded-lg">
                      <Icon name="upload" className="w-5 h-5" />
                    </div>
                    <h2 className="text-md font-bold text-slate-100">2. 素材與手繪稿照片載入</h2>
                  </div>
                  
                  <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                    <button
                      onClick={() => {
                        setActiveTab('upload');
                        showToast("已切換至個人照片上傳分頁！");
                      }}
                      className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                        activeTab === 'upload' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:text-white'
                      }`}
                    >
                      上傳自製手繪照片
                    </button>
                    <button
                      onClick={() => {
                        setActiveTab('presets');
                        showToast("已切換至內建精選卡通庫！");
                      }}
                      className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                        activeTab === 'presets' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:text-white'
                      }`}
                    >
                      選擇內建常用圖案
                    </button>
                  </div>
                </div>

                {activeTab === 'upload' ? (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                    <label className="border-2 border-dashed border-slate-855 hover:border-rose-500 rounded-xl p-6 flex flex-col items-center justify-center gap-2 cursor-pointer transition-all bg-slate-900/20 hover:bg-slate-900/60 group">
                      <div className="w-10 h-10 rounded-full bg-slate-850 flex items-center justify-center group-hover:scale-110 transition-transform">
                        <Icon name="upload" className="w-5 h-5 text-slate-400 group-hover:text-rose-500" />
                      </div>
                      <span className="text-xs font-medium text-slate-300">
                        點擊選擇或拖曳上傳照片
                      </span>
                      <span className="text-[10px] text-slate-550">
                        支援 JPG, PNG, WEBP 等各式圖片
                      </span>
                      <input 
                        type="file" 
                        accept="image/*" 
                        onChange={handleImageUpload} 
                        className="hidden" 
                      />
                    </label>

                    <div className="text-slate-400 text-xs space-y-2 bg-slate-900/60 p-4 rounded-xl border border-slate-850 leading-relaxed">
                      <p className="font-semibold text-slate-300 flex items-center gap-1">
                        <Icon name="shield" className="w-3.5 h-3.5 text-rose-400" /> 研習手繪與相片製版指南：
